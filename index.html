 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Dinero</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.topbar{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
}

button{
background:#2563eb;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
position:relative;
}

/* botón cerrar */

.close{
position:absolute;
top:4px;
right:4px;
background:#ef4444;
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
cursor:pointer;
font-size:14px;
opacity:0;
transform:scale(0.8);
transition:all .25s ease;
}

.card:hover .close{
opacity:1;
transform:scale(1);
}

.close:hover{
background:#dc2626;
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
margin:8px 0;
}

.label{
font-weight:bold;
}

.controls{
display:flex;
align-items:center;
gap:6px;
}

input{
width:70px;
text-align:center;
padding:5px;
border-radius:6px;
border:none;
}

.arrow{
width:28px;
height:28px;
border-radius:6px;
background:#334155;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.arrow:hover{
background:#475569;
}

.total{
margin-top:12px;
font-size:18px;
font-weight:bold;
}

.reset{
margin-top:10px;
background:#ef4444;
width:100%;
}

.reset:hover{
background:#dc2626;
}

.global{
text-align:center;
font-size:24px;
margin-bottom:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Calculadora de Dinero</h1>

<div class="global">
Total General: $<span id="totalGlobal">0</span>
</div>

<div class="topbar">
<button onclick="crearCalculadora()">➕ Nueva Cuenta</button>
</div>

<div class="container" id="contenedor"></div>

<script>

const denominaciones=[5,10,20,50,100,200,500,1000]

function crearCalculadora(){

let card=document.createElement("div")
card.className="card"

let html=`<div class="close" onclick="cerrar(this)">✖</div>`

denominaciones.forEach(d=>{

html+=`
<div class="row">
<div class="label">$${d}</div>

<div class="controls">

<div class="arrow" onclick="cambiar(this,-1)">▼</div>

<input type="text" value="0" data-den="${d}" oninput="calcular(this)" onkeydown="enterOperacion(event,this)">

<div class="arrow" onclick="cambiar(this,1)">▲</div>

</div>
</div>
`

})

html+=`
<div class="total">
Total: $<span class="totalCuenta">0</span>
</div>

<button class="reset" onclick="reiniciar(this)">Reiniciar</button>
`

card.innerHTML=html

document.getElementById("contenedor").appendChild(card)

actualizarBotonesCerrar()

}

function evaluar(valor){

try{
return Function("return "+valor)()
}catch{
return 0
}

}

function enterOperacion(e,input){

if(e.key==="Enter"){

e.preventDefault()

let resultado=evaluar(input.value)

if(isNaN(resultado)) resultado=0

input.value=resultado

calcular(input)

}

}

function calcular(input){

let card=input.closest(".card")

let total=0

card.querySelectorAll("input").forEach(inp=>{

let den=parseFloat(inp.dataset.den)

let cant=evaluar(inp.value)

if(isNaN(cant))cant=0

total+=cant*den

})

card.querySelector(".totalCuenta").textContent=total

calcularGlobal()

}

function calcularGlobal(){

let total=0

document.querySelectorAll(".totalCuenta").forEach(t=>{

total+=parseFloat(t.textContent)||0

})

document.getElementById("totalGlobal").textContent=total

}

function cambiar(btn,valor){

let input=btn.parentElement.querySelector("input")

let num=evaluar(input.value)

num+=valor

if(num<0)num=0

input.value=num

calcular(input)

}

function reiniciar(btn){

let card=btn.closest(".card")

card.querySelectorAll("input").forEach(i=>i.value=0)

card.querySelector(".totalCuenta").textContent=0

calcularGlobal()

}

function cerrar(btn){

let cards=document.querySelectorAll(".card")

if(cards.length<=1) return

btn.closest(".card").remove()

calcularGlobal()

actualizarBotonesCerrar()

}

function actualizarBotonesCerrar(){

let cards=document.querySelectorAll(".card")
let habilitar=cards.length>1

cards.forEach(card=>{
card.querySelector(".close").style.pointerEvents=habilitar?"auto":"none"
})

}

crearCalculadora()

</script>

</body>
</html>
